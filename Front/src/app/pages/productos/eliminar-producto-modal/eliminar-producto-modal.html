<div
  class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
  (click)="cancelar()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6" (click)="$event.stopPropagation()">

    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
        <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </div>
      <h2 class="text-base font-semibold text-gray-800">Eliminar producto</h2>
    </div>

    <p class="text-sm text-gray-500 mb-6">
      ¿Desea eliminar este producto? Esta acción no se puede deshacer.
    </p>

    <div class="flex justify-end gap-3">
      <button
        (click)="cancelar()"
        class="flex items-center gap-2 px-4 py-2 text-sm rounded border border-red-300 bg-red-50 text-red-600 hover:bg-red-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        No
      </button>
      <button
        (click)="confirmar.emit()"
        class="flex items-center gap-2 px-4 py-2 text-sm rounded border border-green-300 bg-green-50 text-green-600 hover:bg-green-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        Sí
      </button>
    </div>

  </div>
</div>
